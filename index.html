<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edgar Aranda</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1b1c1d;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 2rem 1.25rem;
    }

    .card {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .avatar {
      width: 240px;
      height: 240px;
      border-radius: 50%;
      margin: 0 auto 1.5rem;
      overflow: hidden;
      border: 3px solid #2a2a2a;
      box-shadow: 0 0 0 4px #1a1a1a;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .title {
      margin-top: 0.4rem;
      font-size: 0.95rem;
      color: #888;
    }

    .location {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #aaa;
      text-transform: uppercase;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 2rem;
    }

    .link {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.9rem 1.25rem;
      border-radius: 14px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #f0f0f0;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }

    .link:hover, .link:focus-visible {
      background: #222;
      border-color: #444;
      transform: translateY(-1px);
    }

    .link:active { transform: translateY(0); }

    .link-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-icon svg { width: 20px; height: 20px; fill: currentColor; }

    .icon-github   { background: #24292e; color: #fff; }
    .icon-linkedin { background: #0077b5; color: #fff; }
    .icon-email    { background: #ea4335; color: #fff; }

    .link-text { flex: 1; text-align: left; }
    .link-label { font-size: 0.78rem; color: #666; }
    .link-value { font-size: 0.95rem; }

    .arrow { color: #555; font-size: 1rem; }

    footer {
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">
      <img src="me.jpeg" alt="Edgar Aranda" />
    </div>
    <h1>Edgar Aranda ☕</h1>
    <p class="title">Senior Software Engineer, Architect, and Entrepreneur</p>
    <p class="location">📍 Midtown Manhattan, NYC</p>

    <div class="links">

      <a class="link" href="https://github.com/eoaranda" target="_blank" rel="noopener">
        <span class="link-icon icon-github">
          <svg viewBox="0 0 24 24"><path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.38 7.86 10.9.57.1.78-.25.78-.55v-1.93c-3.19.69-3.86-1.54-3.86-1.54-.52-1.32-1.27-1.67-1.27-1.67-1.04-.71.08-.7.08-.7 1.15.08 1.75 1.18 1.75 1.18 1.02 1.75 2.68 1.24 3.33.95.1-.74.4-1.24.72-1.53-2.55-.29-5.23-1.27-5.23-5.67 0-1.25.45-2.27 1.18-3.07-.12-.29-.51-1.46.11-3.04 0 0 .96-.31 3.15 1.17a10.96 10.96 0 0 1 2.87-.39c.97.01 1.95.13 2.87.39 2.19-1.48 3.15-1.17 3.15-1.17.62 1.58.23 2.75.11 3.04.74.8 1.18 1.82 1.18 3.07 0 4.41-2.69 5.38-5.25 5.66.41.36.78 1.06.78 2.13v3.16c0 .31.21.66.79.55A11.51 11.51 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5Z"/></svg>
        </span>
        <span class="link-text">
          <span class="link-label">GitHub</span><br/>
          <span class="link-value">github.com/eoaranda</span>
        </span>
        <span class="arrow">›</span>
      </a>

      <a class="link" href="https://www.linkedin.com/in/eoaranda" target="_blank" rel="noopener">
        <span class="link-icon icon-linkedin">
          <svg viewBox="0 0 24 24"><path d="M20.45 20.45h-3.55v-5.57c0-1.33-.03-3.04-1.85-3.04-1.85 0-2.13 1.45-2.13 2.94v5.67H9.37V9h3.41v1.56h.05c.47-.9 1.63-1.85 3.36-1.85 3.59 0 4.26 2.36 4.26 5.44v6.3ZM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12ZM3.56 20.45h3.55V9H3.56v11.45Z"/></svg>
        </span>
        <span class="link-text">
          <span class="link-label">LinkedIn</span><br/>
          <span class="link-value">linkedin.com/in/eoaranda</span>
        </span>
        <span class="arrow">›</span>
      </a>

      <a class="link" id="email-link" href="#">
        <span class="link-icon icon-email">
          <svg viewBox="0 0 24 24"><path d="M20 4H4C2.9 4 2 4.9 2 6v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2Zm0 4-8 5-8-5V6l8 5 8-5v2Z"/></svg>
        </span>
        <span class="link-text">
          <span class="link-label">Email</span><br/>
          <span class="link-value" id="email-display"></span>
        </span>
        <span class="arrow">›</span>
      </a>

    </div>

    <footer>© <span id="year"></span> Edgar Aranda</footer>
  </div>
  <script>
    (function () {
      document.getElementById('year').textContent = new Date().getFullYear();

      var u = 'ing.oaguirre';
      var d = ['gmail', 'com'].join('.');
      var el = document.getElementById('email-link');
      el.href = 'mailto:' + u + '@' + d;
      document.getElementById('email-display').textContent = u + '@' + d;
    })();
  </script>
</body>
</html>
